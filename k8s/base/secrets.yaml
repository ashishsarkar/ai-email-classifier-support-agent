# IMPORTANT: In production, use External Secrets Operator or Sealed Secrets.
# This file is a template — NEVER commit real secrets to git.
apiVersion: v1
kind: Secret
metadata:
  name: email-agent-secrets
  namespace: email-agent
type: Opaque
stringData:
  # LLM Keys
  OPENAI_API_KEY: "sk-litellm-master-key"       # LiteLLM proxy key
  ANTHROPIC_API_KEY: "REPLACE_ME"                # Claude API key

  # Database
  POSTGRES_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql+asyncpg://agent:REPLACE_ME@postgres:5432/customer_support"

  # Email
  EMAIL_ADDRESS: "REPLACE_ME"
  EMAIL_PASSWORD: "REPLACE_ME"

  # LangSmith
  LANGCHAIN_API_KEY: "REPLACE_ME"

  # LiteLLM
  LITELLM_MASTER_KEY: "sk-litellm-master-key"
