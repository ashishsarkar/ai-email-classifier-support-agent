apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: email-agent
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: gp3              # AWS EBS gp3 (fast, cost-effective)
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: email-agent
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate                   # DB can't have two writers
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "customer_support"
            - name: POSTGRES_USER
              value: "agent"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: email-agent-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "agent", "-d", "customer_support"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "agent", "-d", "customer_support"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: email-agent
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
