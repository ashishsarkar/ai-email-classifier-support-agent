apiVersion: v1
kind: ConfigMap
metadata:
  name: email-agent-config
  namespace: email-agent
data:
  # App config
  ENV: "production"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"

  # LLM routing
  OPENAI_MODEL: "default"
  VLLM_BASE_URL: "http://litellm:4000/v1"
  FALLBACK_MODEL: "claude-sonnet-4-6-20250514"
  FALLBACK_BASE_URL: "http://litellm:4000/v1"

  # Circuit breaker
  CB_FAILURE_THRESHOLD: "3"
  CB_COOLDOWN_SECONDS: "60"
  CB_HALF_OPEN_MAX_CALLS: "1"

  # LangSmith
  LANGSMITH_ENABLED: "true"
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_PROJECT: "customer-support-email-agent"
  LANGCHAIN_ENDPOINT: "https://api.smith.langchain.com"

  # Paths
  VECTOR_STORE_PATH: "/app/data/vectors"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: email-agent
data:
  config.yaml: |
    model_list:
      # Primary: Qwen3-8B on vLLM (local GPU inference)
      - model_name: "default"
        litellm_params:
          model: "openai/Qwen/Qwen3-8B"
          api_base: "http://vllm:8001/v1"
          api_key: "dummy"
          max_tokens: 1000
          rpm: 200              # rate limit: 200 requests/min
          tpm: 100000           # token limit: 100K tokens/min

      # Fallback: Claude Sonnet via Anthropic API
      - model_name: "fallback-sonnet"
        litellm_params:
          model: "anthropic/claude-sonnet-4-6-20250514"
          max_tokens: 1000
          rpm: 60
          tpm: 80000

    router_settings:
      routing_strategy: "simple-shuffle"
      num_retries: 2
      timeout: 30
      retry_after: 5
      fallbacks:
        - default: ["fallback-sonnet"]
      set_verbose: false            # disable in production

    general_settings:
      master_key: "sk-litellm-master-key"
